<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Art Challenge ❤️</title>
    <style>
        /* ==========================================
           1. TAMPILAN UI (TIDAK ADA YANG DIUBAH)
           ========================================== */
        :root {
            --primary: #ff4d6d;
            --secondary: #ff8fa3;
            --bg: #fff0f3;
            --surface: #ffffff;
            --text: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            touch-action: none; 
        }

        .header {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 { margin: 0 0 10px 0; font-size: 18px; color: var(--primary); }

        .challenge-box {
            background: var(--bg);
            border: 2px dashed var(--secondary);
            border-radius: 10px;
            padding: 8px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-sm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-share {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .canvas-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .canvas-box {
            position: relative;
            background: white;
            border-radius: 15px;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            height: 32vh; 
        }

        .canvas-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            z-index: 5;
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #fdfdfd;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            cursor: crosshair;
            display: block;
        }

        .disabled-canvas { opacity: 0.8; pointer-events: none; }

        .toolbar {
            position: fixed;
            bottom: 10px;
            width: 95%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }

        input[type="color"] { width: 35px; height: 35px; border: none; background: none; }
        input[type="range"] { width: 70px; }

        .btn-tool {
            background: #eee;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-tool.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <!-- Area Atas -->
    <div class="header">
        <h1>🎨 Couple Art Challenge</h1>
        <div class="challenge-box">
            <span id="challengeText">Tantangan: 🍎 Gambar Apel!</span>
            <button class="btn-sm" onclick="randomChallenge()">Ganti Ide</button>
        </div>
        <button class="btn-share" id="shareBtn">💌 Salin Link Buat Pacar</button>
    </div>

    <!-- Area Kanvas -->
    <div class="canvas-container">
        <!-- Canvas 1: Selalu Canvas Milik Sendiri (Bisa Digambar) -->
        <div class="canvas-box" id="box1">
            <div class="canvas-label" id="label1">Kanvas Kamu <span id="status1" style="font-weight: normal; font-size: 10px; margin-left: 5px;"></span></div>
            <canvas id="canvas1"></canvas>
        </div>
        <!-- Canvas 2: Selalu Canvas Pacar (Read-Only) -->
        <div class="canvas-box disabled-canvas" id="box2" style="pointer-events: none;">
            <div class="canvas-label" id="label2" style="background:var(--secondary);">Kanvas Pacar <span id="status2" style="font-weight: normal; font-size: 10px; margin-left: 5px;"></span></div>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <!-- Area Alat Gambar -->
    <div class="toolbar">
        <div class="tool-group">
            <input type="color" id="colorPicker" value="#ff4d6d">
            <input type="range" id="sizePicker" min="1" max="20" value="4">
        </div>
        <div class="tool-group">
            <button class="btn-tool active" id="btnDraw" onclick="setTool('draw')" title="Pensil">✏️</button>
            <button class="btn-tool" id="btnErase" onclick="setTool('erase')" title="Penghapus">🧽</button>
            <button class="btn-tool" onclick="undo()" title="Undo">↩️</button>
            <button class="btn-tool" onclick="redo()" title="Redo">↪️</button>
            <button class="btn-tool" onclick="clearMyCanvas()" title="Hapus Semua">🗑️</button>
            <button class="btn-tool" onclick="downloadSingle()" title="Simpan Gambar Sendiri">💾</button>
            <button class="btn-tool" onclick="downloadCombined()" title="Simpan Gabungan">🖼️</button>
        </div>
    </div>

    <!-- ==========================================
         2. LOGIKA JAVASCRIPT & FIREBASE
         ========================================== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. Inisialisasi Database Gratis Firebase
        const firebaseConfig = {
            databaseURL: "https://kanvas-ldr-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 2. Client ID Otomatis
        let clientId = localStorage.getItem('ldr_client_id');
        if (!clientId) {
            clientId = typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : 'id_' + Date.now().toString(36) + Math.random().toString(36).substring(2);
            localStorage.setItem('ldr_client_id', clientId);
        }
        console.log("clientId saya:", clientId);

        // 3. Setup ID Room dari URL
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (!roomId) {
            roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            window.history.replaceState({}, '', `?room=${roomId}`);
        }

        // 4. Setup Canvas
        const myCanvas = document.getElementById('canvas1');
        const partnerCanvas = document.getElementById('canvas2');
        const myCtx = myCanvas.getContext('2d');
        const partnerCtx = partnerCanvas.getContext('2d');

        function fixCanvasSize() {
            [myCanvas, partnerCanvas].forEach(c => {
                const rect = c.parentElement.getBoundingClientRect();
                c.width = rect.width - 10;
                c.height = rect.height - 10;
            });
            redrawCanvas(myActions, myUndoneStrokes, myCtx, myCanvas);
            redrawCanvas(partnerActions, partnerUndoneStrokes, partnerCtx, partnerCanvas);
        }
        window.addEventListener('resize', fixCanvasSize);
        setTimeout(fixCanvasSize, 100);

        // State & Variabel
        let processedIds = new Set();
        let myActions = [], partnerActions = [];
        let myUndoneStrokes = new Set(), partnerUndoneStrokes = new Set();
        let myStrokeHistory = [], myRedoStack = [];
        let currentTool = 'draw';
        let otherId = null;

        // Referensi Node Sendiri
        const myDrawRef = db.ref(`rooms/${roomId}/drawings/${clientId}`);
        const participantsRef = db.ref(`rooms/${roomId}/participants`);

        // Daftarkan Diri ke Room
        participantsRef.child(clientId).set(true).then(() => {
            console.log("participant baru teregistrasi");
        });

        // Cari Pasangan (Listen on Participants)
        participantsRef.on('child_added', snap => {
            const id = snap.key;
            console.log("participant ditemukan:", id);
            
            // Jika participant yang masuk BUKAN saya, dan belum ada partner tersimpan
            if (id !== clientId && !otherId) {
                otherId = id;
                setupPartnerListener(otherId);
                setupPartnerPresence(otherId);
            }
        });

        // 5. Tools Engine
        window.setTool = function(tool) {
            currentTool = tool;
            document.getElementById('btnDraw').classList.toggle('active', tool === 'draw');
            document.getElementById('btnErase').classList.toggle('active', tool === 'erase');
        }
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

        function drawLocalStroke(action, ctx) {
            ctx.lineWidth = action.size;
            ctx.lineCap = 'round';
            ctx.strokeStyle = action.type === 'erase' ? '#fdfdfd' : action.color;
            ctx.beginPath();
            ctx.moveTo(action.prevX, action.prevY);
            ctx.lineTo(action.x, action.y);
            ctx.stroke();
        }

        function redrawCanvas(actionList, undoneSet, ctx, canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            actionList.forEach(action => {
                if (undoneSet.has(action.strokeId)) return;
                if (action.type === 'clear') {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else if (action.type === 'draw' || action.type === 'erase') {
                    drawLocalStroke(action, ctx);
                }
            });
        }

        // 6. DRAWING ENGINE (Hanya di Canvas Saya)
        let isDrawing = false;
        let lastPos = null, currentPos = null, currentStrokeId = null;

        function getMousePos(e) {
            const rect = myCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function setTyping(status) {
            db.ref(`rooms/${roomId}/presence/${clientId}/typing`).set(status);
        }

        myCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        myCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); updatePosition(e); });
        myCanvas.addEventListener('touchend', finishedPosition);
        
        myCanvas.addEventListener('mousedown', startPosition);
        myCanvas.addEventListener('mousemove', updatePosition);
        myCanvas.addEventListener('mouseup', finishedPosition);
        myCanvas.addEventListener('mouseleave', finishedPosition);

        function startPosition(e) {
            isDrawing = true;
            currentStrokeId = generateId();
            myStrokeHistory.push(currentStrokeId);
            myRedoStack = [];
            lastPos = getMousePos(e);
            currentPos = { ...lastPos };
            setTyping(true);
        }

        function updatePosition(e) {
            if (isDrawing) currentPos = getMousePos(e);
        }

        function finishedPosition() {
            if (isDrawing) {
                isDrawing = false;
                setTyping(false);
            }
        }

        function drawEngine() {
            if (isDrawing && currentPos && lastPos) {
                if (currentPos.x !== lastPos.x || currentPos.y !== lastPos.y) {
                    const action = {
                        type: currentTool,
                        x: parseFloat(currentPos.x.toFixed(2)),
                        y: parseFloat(currentPos.y.toFixed(2)),
                        prevX: parseFloat(lastPos.x.toFixed(2)),
                        prevY: parseFloat(lastPos.y.toFixed(2)),
                        color: currentTool === 'erase' ? '#fdfdfd' : colorPicker.value,
                        size: sizePicker.value,
                        strokeId: currentStrokeId,
                        id: generateId()
                    };

                    drawLocalStroke(action, myCtx);
                    processedIds.add(action.id);
                    myActions.push(action);
                    
                    myDrawRef.push(action).then(() => {
                        console.log("stroke terkirim");
                    });
                    
                    lastPos = { ...currentPos };
                }
            }
            requestAnimationFrame(drawEngine);
        }
        requestAnimationFrame(drawEngine);

        // 7. FIREBASE LISTENERS (Sinkronisasi & Histori)

        function processIncomingAction(action, actionList, undoneSet, ctx, canvas) {
            if (action.type === 'undo') {
                undoneSet.add(action.strokeId);
                redrawCanvas(actionList, undoneSet, ctx, canvas);
            } else if (action.type === 'redo') {
                undoneSet.delete(action.strokeId);
                redrawCanvas(actionList, undoneSet, ctx, canvas);
            } else if (action.type === 'clear') {
                redrawCanvas(actionList, undoneSet, ctx, canvas);
            } else {
                if (!undoneSet.has(action.strokeId)) drawLocalStroke(action, ctx);
            }
        }

        // Listener untuk me-load histori gambar SENDIRI
        myDrawRef.on('child_added', snap => {
            const action = snap.val();
            if (!processedIds.has(action.id)) {
                processedIds.add(action.id);
                myActions.push(action);
                processIncomingAction(action, myActions, myUndoneStrokes, myCtx, myCanvas);
            }
        });

        // Listener untuk menerima gambar PASANGAN (Ditargetkan ke Canvas 2)
        function setupPartnerListener(partnerId) {
            console.log("listener aktif untuk pasangan:", partnerId);
            const partnerDrawRef = db.ref(`rooms/${roomId}/drawings/${partnerId}`);
            
            partnerDrawRef.on('child_added', snap => {
                const action = snap.val();
                if (!processedIds.has(action.id)) {
                    console.log("stroke diterima");
                    processedIds.add(action.id);
                    partnerActions.push(action);
                    processIncomingAction(action, partnerActions, partnerUndoneStrokes, partnerCtx, partnerCanvas);
                }
            }, err => {
                console.log("listener gagal", err);
            });
        }

        // Sistem Tantangan Sinkron
        const challengeRef = db.ref(`rooms/${roomId}/challenge`);
        const challenges = ["🍎 Gambar Apel!", "🐱 Gambar Kucing", "🏠 Rumah Idaman", "🍕 Makanan Kesukaan", "❤️ Gambar Hati", "👽 Alien Nyasar", "🚗 Mobil Impian"];
        window.randomChallenge = () => challengeRef.set(challenges[Math.floor(Math.random() * challenges.length)]);
        challengeRef.on('value', snap => { if (snap.val()) document.getElementById('challengeText').innerText = "Tantangan: " + snap.val(); });

        // 8. UNDO/REDO/CLEAR (Hanya berlaku untuk Kanvas Sendiri)
        window.undo = () => {
            if (myStrokeHistory.length > 0) {
                const strokeId = myStrokeHistory.pop();
                myRedoStack.push(strokeId);
                const action = { type: 'undo', strokeId: strokeId, id: generateId() };
                processedIds.add(action.id);
                myActions.push(action);
                myDrawRef.push(action);
                myUndoneStrokes.add(strokeId);
                redrawCanvas(myActions, myUndoneStrokes, myCtx, myCanvas);
            }
        };

        window.redo = () => {
            if (myRedoStack.length > 0) {
                const strokeId = myRedoStack.pop();
                myStrokeHistory.push(strokeId);
                const action = { type: 'redo', strokeId: strokeId, id: generateId() };
                processedIds.add(action.id);
                myActions.push(action);
                myDrawRef.push(action);
                myUndoneStrokes.delete(strokeId);
                redrawCanvas(myActions, myUndoneStrokes, myCtx, myCanvas);
            }
        };

        window.clearMyCanvas = () => {
            const strokeId = 'clear_' + generateId();
            myStrokeHistory.push(strokeId);
            myRedoStack = [];
            const action = { type: 'clear', strokeId: strokeId, id: generateId() };
            processedIds.add(action.id);
            myActions.push(action);
            myDrawRef.push(action);
            redrawCanvas(myActions, myUndoneStrokes, myCtx, myCanvas);
        };

        // 9. STATUS ONLINE & MENGETIK
        const myPresenceRef = db.ref(`rooms/${roomId}/presence/${clientId}`);
        myPresenceRef.onDisconnect().set({ online: false, typing: false });
        myPresenceRef.set({ online: true, typing: false });

        document.getElementById('status1').innerText = "(🟢 Online)";
        document.getElementById('status1').style.color = "#4caf50";

        function setupPartnerPresence(partnerId) {
            const partnerPresenceRef = db.ref(`rooms/${roomId}/presence/${partnerId}`);
            partnerPresenceRef.on('value', snap => {
                const data = snap.val();
                const partnerStatus = document.getElementById('status2');
                if (data && data.online) {
                    if (data.typing) {
                        partnerStatus.innerText = "❤️ Sedang menggambar...";
                        partnerStatus.style.color = "#ff4d6d";
                        partnerStatus.style.fontWeight = "bold";
                    } else {
                        partnerStatus.innerText = "🟢 Online";
                        partnerStatus.style.color = "#4caf50";
                        partnerStatus.style.fontWeight = "normal";
                    }
                } else {
                    partnerStatus.innerText = "⚪ Menunggu...";
                    partnerStatus.style.color = "#888";
                    partnerStatus.style.fontWeight = "normal";
                }
            });
        }

        // 10. FITUR SHARE & DOWNLOAD
        document.getElementById('shareBtn').addEventListener('click', () => {
            const linkBuatPacar = `${window.location.href.split('?')[0]}?room=${roomId}`;
            navigator.clipboard.writeText(linkBuatPacar).then(() => {
                alert("Link berhasil disalin! Silakan kirim ke WA pasangan.");
            }).catch(() => prompt("Salin manual teks ini:", linkBuatPacar));
        });

        window.downloadSingle = () => {
            const link = document.createElement('a');
            link.download = `kanvas-ku-${generateId().substring(0,4)}.png`;
            link.href = myCanvas.toDataURL('image/png');
            link.click();
        };

        window.downloadCombined = () => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = myCanvas.width;
            tempCanvas.height = myCanvas.height + partnerCanvas.height + 20; 
            const tCtx = tempCanvas.getContext('2d');
            
            tCtx.fillStyle = '#fff0f3';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            tCtx.drawImage(myCanvas, 0, 0);
            tCtx.drawImage(partnerCanvas, 0, myCanvas.height + 20);

            const link = document.createElement('a');
            link.download = `couple-gabungan-${generateId().substring(0,4)}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
