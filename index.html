<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Gambar Kita ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #ff4d6d;
            margin: 15px 0 5px 0;
            font-size: 20px;
        }

        p {
            color: #666;
            margin: 0 0 15px 0;
            font-size: 12px;
            text-align: center;
        }

        .container {
            position: relative;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 3px solid #ffb3c1;
            width: 90%;
            max-width: 800px;
            height: 60vh;
        }

        canvas {
            display: block;
            cursor: crosshair;
            background-color: #ffffff;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            align-items: center;
            justify-content: center;
            width: 85%;
        }

        button, input[type="color"], input[type="range"] {
            border: none;
            background: #ff4d6d;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }

        .btn-invite { background: #4caf50; }
        .btn-clear { background: #757575; }
        label { font-size: 11px; color: #444; font-weight: bold; }
        input[type="range"] { width: 60px; padding: 0; }
    </style>
</head>
<body>

    <h1>Ruang Gambar Kita ❤️</h1>
    <p id="status-text">Menghubungkan ke ruang gambar...</p>

    <div class="container">
        <canvas id="paintCanvas"></canvas>
        <div class="controls">
            <button class="btn-invite" id="shareBtn">Bagikan Link ke Pacar</button>
            
            <label for="colorPicker">Warna:</label>
            <input type="color" id="colorPicker" value="#ff4d6d">

            <label for="lineWidth">Ukuran:</label>
            <input type="range" id="lineWidth" min="1" max="20" value="5">

            <button class="btn-clear" id="clearBtn">Hapus</button>
        </div>
    </div>

    <!-- SCRIPT 1: Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- SCRIPT 2: Logika Aplikasi (Real-time Drawing) -->
    <script>
        // Konfigurasi Firebase Publik (Gratis & Siap Pakai)
        const firebaseConfig = {
            databaseURL: "https://kanvas-ldr-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Mengatur ID Ruangan unik (mengambil dari URL jika ada, jika tidak ada buat baru)
        let urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        
        if (!roomId) {
            roomId = Math.random().toString(36).substring(2, 9);
            window.history.pushState({}, '', '?room=' + roomId);
        }

        const roomRef = database.ref('rooms/' + roomId);
        document.getElementById('status-text').innerText = "Kamu ada di ruang gambar. Bagikan link ke pacarmu!";

        // Setup Kanvas
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const lineWidthInput = document.getElementById('lineWidth');
        const clearBtn = document.getElementById('clearBtn');

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        let painting = false;

        // Fungsi mengirim data coretan ke Firebase
        function sendDrawData(x, y, isDrawing) {
            roomRef.push({
                x: x,
                y: y,
                color: colorPicker.value,
                size: lineWidthInput.value,
                isDrawing: isDrawing,
                time: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // Event saat mulai mencoret
        function startPosition(e) {
            painting = true;
            const coords = getCoords(e);
            sendDrawData(coords.x, coords.y, false); // false = mulai garis baru
        }

        function finishedPosition() {
            painting = false;
        }

        function draw(e) {
            if (!painting) return;
            const coords = getCoords(e);
            sendDrawData(coords.x, coords.y, true); // true = sedang menarik garis
        }

        // Listener Event (HP & Laptop)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Menerima coretan dari Firebase secara real-time
        let lastX = null;
        let lastY = null;

        roomRef.limitToLast(100).on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (data === "clear") {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                lastX = null;
                lastY = null;
                return;
            }

            ctx.lineWidth = data.size;
            ctx.lineCap = 'round';
            ctx.strokeStyle = data.color;

            if (data.isDrawing && lastX !== null && lastY !== null) {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(data.x, data.y);
                ctx.stroke();
            }

            lastX = data.x;
            lastY = data.y;
        });

        // Tombol Hapus
        clearBtn.addEventListener('click', () => {
            roomRef.set({ "clear": "clear" });
        });

        // Tombol Bagikan Link
        document.getElementById('shareBtn').addEventListener('click', () => {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                alert("Link berhasil disalin! Tinggal kamu paste/kirim ke WA pacarmu ya.");
            }).catch(err => {
                alert("Gagal menyalin otomatis. Silakan salin URL browser kamu manual dan kirim ke pacar.");
            });
        });
    </script>

</body>
</html>
