<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Art Challenge ❤️</title>
    <style>
        /* ==========================================
           1. TAMPILAN UI (TIDAK ADA YANG DIUBAH)
           ========================================== */
        :root {
            --primary: #ff4d6d;
            --secondary: #ff8fa3;
            --bg: #fff0f3;
            --surface: #ffffff;
            --text: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            touch-action: none; 
        }

        .header {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 { margin: 0 0 10px 0; font-size: 18px; color: var(--primary); }

        .challenge-box {
            background: var(--bg);
            border: 2px dashed var(--secondary);
            border-radius: 10px;
            padding: 8px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-sm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-share {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .canvas-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .canvas-box {
            position: relative;
            background: white;
            border-radius: 15px;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            height: 32vh; 
        }

        .canvas-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            z-index: 5;
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #fdfdfd;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            cursor: crosshair;
            display: block;
        }

        .disabled-canvas { opacity: 0.8; pointer-events: none; }

        .toolbar {
            position: fixed;
            bottom: 10px;
            width: 95%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }

        input[type="color"] { width: 35px; height: 35px; border: none; background: none; }
        input[type="range"] { width: 70px; }

        .btn-tool {
            background: #eee;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-tool.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <!-- Area Atas -->
    <div class="header">
        <h1>🎨 Couple Art Challenge</h1>
        <div class="challenge-box">
            <span id="challengeText">Tantangan: 🍎 Gambar Apel!</span>
            <button class="btn-sm" onclick="randomChallenge()">Ganti Ide</button>
        </div>
        <button class="btn-share" id="shareBtn">💌 Salin Link Buat Pacar</button>
    </div>

    <!-- Area Kanvas -->
    <div class="canvas-container">
        <div class="canvas-box" id="box1">
            <div class="canvas-label" id="label1">Kanvas P1 <span id="status1" style="font-weight: normal; font-size: 10px; margin-left: 5px;"></span></div>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="canvas-box" id="box2">
            <div class="canvas-label" id="label2" style="background:var(--secondary);">Kanvas P2 <span id="status2" style="font-weight: normal; font-size: 10px; margin-left: 5px;"></span></div>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <!-- Area Alat Gambar -->
    <div class="toolbar">
        <div class="tool-group">
            <input type="color" id="colorPicker" value="#ff4d6d">
            <input type="range" id="sizePicker" min="1" max="20" value="4">
        </div>
        <div class="tool-group">
            <!-- Menambahkan tombol Undo, Redo, dan Download sesuai struktur asli tanpa mengubah tampilan CSS -->
            <button class="btn-tool active" id="btnDraw" onclick="setTool('draw')" title="Pensil">✏️</button>
            <button class="btn-tool" id="btnErase" onclick="setTool('erase')" title="Penghapus">🧽</button>
            <button class="btn-tool" onclick="undo()" title="Undo">↩️</button>
            <button class="btn-tool" onclick="redo()" title="Redo">↪️</button>
            <button class="btn-tool" onclick="clearMyCanvas()" title="Hapus Semua">🗑️</button>
            <button class="btn-tool" onclick="downloadSingle()" title="Simpan Gambar Sendiri">💾</button>
            <button class="btn-tool" onclick="downloadCombined()" title="Simpan Gabungan">🖼️</button>
        </div>
    </div>

    <!-- ==========================================
         2. LOGIKA JAVASCRIPT & FIREBASE
         ========================================== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. Inisialisasi Database Gratis Firebase
        const firebaseConfig = {
            databaseURL: "https://kanvas-ldr-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 2. Setup ID Room & Identifikasi
        let urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        let playerNum = urlParams.get('p');
        
        if (!roomId || !playerNum) {
            roomId = Math.random().toString(36).substring(2, 8);
            playerNum = '1';
            window.history.replaceState({}, '', `?room=${roomId}&p=1`);
        }

        const myPlayerId = parseInt(playerNum);
        const partnerId = myPlayerId === 1 ? 2 : 1;
        
        const myDrawRef = db.ref(`rooms/${roomId}/drawings/p${myPlayerId}`);
        const challengeRef = db.ref(`rooms/${roomId}/challenge`);

        // 3. Setup Kanvas
        const canvas1 = document.getElementById('canvas1');
        const canvas2 = document.getElementById('canvas2');
        const ctx1 = canvas1.getContext('2d');
        const ctx2 = canvas2.getContext('2d');

        let myCanvas, myCtx;
        
        if (myPlayerId === 1) {
            myCanvas = canvas1; myCtx = ctx1;
            document.getElementById('box2').classList.add('disabled-canvas');
            document.getElementById('label1').innerHTML = `Kanvas Kamu <span id="status1"></span>`;
            document.getElementById('label2').innerHTML = `Kanvas Pacar <span id="status2"></span>`;
        } else {
            myCanvas = canvas2; myCtx = ctx2;
            document.getElementById('box1').classList.add('disabled-canvas');
            document.getElementById('label2').innerHTML = `Kanvas Kamu <span id="status2"></span>`;
            document.getElementById('label1').innerHTML = `Kanvas Pacar <span id="status1"></span>`;
            document.getElementById('shareBtn').style.display = 'none'; 
        }

        function fixCanvasSize() {
            [canvas1, canvas2].forEach(c => {
                const rect = c.parentElement.getBoundingClientRect();
                c.width = rect.width - 10;
                c.height = rect.height - 10;
            });
            // Redraw setelah resize (agar gambar tidak hilang)
            redrawCanvas(1, ctx1, canvas1);
            redrawCanvas(2, ctx2, canvas2);
        }
        window.addEventListener('load', fixCanvasSize);
        setTimeout(fixCanvasSize, 500); 

        // 4. State & Tools
        let currentTool = 'draw';
        window.setTool = function(tool) {
            currentTool = tool;
            document.getElementById('btnDraw').classList.toggle('active', tool === 'draw');
            document.getElementById('btnErase').classList.toggle('active', tool === 'erase');
        }
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');

        // Generator ID Unik
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

        // DATA STORE UNTUK SINKRONISASI & UNDO/REDO
        let processedIds = new Set();
        let actions = { 1: [], 2: [] }; 
        let undoneStrokes = { 1: new Set(), 2: new Set() };
        
        // Local history stack for Undo/Redo tracking
        let myStrokeHistory = []; 
        let myRedoStack = [];     

        // 5. Fungsi Render Lokal
        function drawLocal(action, ctx) {
            ctx.lineWidth = action.size;
            ctx.lineCap = 'round';
            ctx.strokeStyle = action.type === 'erase' ? '#fdfdfd' : action.color;
            ctx.beginPath();
            ctx.moveTo(action.prevX, action.prevY);
            ctx.lineTo(action.x, action.y);
            ctx.stroke();
        }

        // Fungsi Redraw Total (dipakai untuk Undo/Redo & Load History)
        function redrawCanvas(playerId, ctx, canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            actions[playerId].forEach(action => {
                if (undoneStrokes[playerId].has(action.strokeId)) return;

                if (action.type === 'clear') {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else if (action.type === 'draw' || action.type === 'erase') {
                    drawLocal(action, ctx);
                }
            });
        }

        // 6. Sistem Menggambar Berbasis Loop (Optimasi RequestAnimationFrame)
        let isDrawing = false;
        let lastPos = null;
        let currentPos = null;
        let currentStrokeId = null;

        function getMousePos(e) {
            const rect = myCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function setMyPresenceTyping(typing) {
            db.ref(`rooms/${roomId}/presence/p${myPlayerId}/typing`).set(typing);
        }

        function startPosition(e) {
            isDrawing = true;
            currentStrokeId = generateId();
            myStrokeHistory.push(currentStrokeId);
            myRedoStack = []; // Hapus redo stack jika mulai gambar baru
            
            lastPos = getMousePos(e);
            currentPos = { ...lastPos };
            setMyPresenceTyping(true);
        }

        function updatePosition(e) {
            if (isDrawing) currentPos = getMousePos(e);
        }

        function finishedPosition() {
            if (isDrawing) {
                isDrawing = false;
                setMyPresenceTyping(false);
            }
        }

        // Engine Loop (60 FPS) mencegah spam server Firebase
        function drawEngine() {
            if (isDrawing && currentPos && lastPos) {
                if (currentPos.x !== lastPos.x || currentPos.y !== lastPos.y) {
                    const action = {
                        type: currentTool,
                        x: parseFloat(currentPos.x.toFixed(2)), // Hemat byte data
                        y: parseFloat(currentPos.y.toFixed(2)),
                        prevX: parseFloat(lastPos.x.toFixed(2)),
                        prevY: parseFloat(lastPos.y.toFixed(2)),
                        color: currentTool === 'erase' ? '#fdfdfd' : colorPicker.value,
                        size: sizePicker.value,
                        strokeId: currentStrokeId,
                        id: generateId()
                    };

                    // Optimasi: Tampilkan di layar sendiri seketika
                    drawLocal(action, myCtx);
                    
                    processedIds.add(action.id);
                    actions[myPlayerId].push(action);

                    // Kirim ke server
                    myDrawRef.push(action);
                    
                    lastPos = { ...currentPos };
                }
            }
            requestAnimationFrame(drawEngine);
        }
        requestAnimationFrame(drawEngine); // Mulai engine

        // Listener Event
        myCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        myCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); updatePosition(e); });
        myCanvas.addEventListener('touchend', finishedPosition);
        
        myCanvas.addEventListener('mousedown', startPosition);
        myCanvas.addEventListener('mousemove', updatePosition);
        myCanvas.addEventListener('mouseup', finishedPosition);
        myCanvas.addEventListener('mouseleave', finishedPosition);

        // 7. Menerima Data Real-time & History dari Firebase (Mencegah Loop)
        function listenToPlayer(playerId, ctx, canvas) {
            db.ref(`rooms/${roomId}/drawings/p${playerId}`).on('child_added', snap => {
                const action = snap.val();
                
                // Mencegah infinite loop: jika ID belum pernah diproses (dari pacar atau reload history)
                if (!processedIds.has(action.id)) {
                    processedIds.add(action.id);
                    actions[playerId].push(action);

                    if (action.type === 'undo') {
                        undoneStrokes[playerId].add(action.strokeId);
                        redrawCanvas(playerId, ctx, canvas);
                    } else if (action.type === 'redo') {
                        undoneStrokes[playerId].delete(action.strokeId);
                        redrawCanvas(playerId, ctx, canvas);
                    } else if (action.type === 'clear') {
                        redrawCanvas(playerId, ctx, canvas);
                    } else {
                        // Jangan gambar jika garis sudah dibatalkan (undo)
                        if (!undoneStrokes[playerId].has(action.strokeId)) {
                            drawLocal(action, ctx);
                        }
                    }
                }
            });
        }
        listenToPlayer(1, ctx1, canvas1);
        listenToPlayer(2, ctx2, canvas2);

        // 8. Fitur Undo, Redo & Clear
        window.undo = () => {
            if (myStrokeHistory.length > 0) {
                const strokeId = myStrokeHistory.pop();
                myRedoStack.push(strokeId);
                
                const action = { type: 'undo', strokeId: strokeId, id: generateId() };
                processedIds.add(action.id);
                actions[myPlayerId].push(action);
                myDrawRef.push(action);
                
                undoneStrokes[myPlayerId].add(strokeId);
                redrawCanvas(myPlayerId, myCtx, myCanvas);
            }
        };

        window.redo = () => {
            if (myRedoStack.length > 0) {
                const strokeId = myRedoStack.pop();
                myStrokeHistory.push(strokeId);
                
                const action = { type: 'redo', strokeId: strokeId, id: generateId() };
                processedIds.add(action.id);
                actions[myPlayerId].push(action);
                myDrawRef.push(action);
                
                undoneStrokes[myPlayerId].delete(strokeId);
                redrawCanvas(myPlayerId, myCtx, myCanvas);
            }
        };

        window.clearMyCanvas = () => {
            const strokeId = 'clear_' + generateId();
            myStrokeHistory.push(strokeId);
            myRedoStack = [];
            
            const action = { type: 'clear', strokeId: strokeId, id: generateId() };
            processedIds.add(action.id);
            actions[myPlayerId].push(action);
            myDrawRef.push(action);
            
            redrawCanvas(myPlayerId, myCtx, myCanvas);
        };

        // 9. Sistem Kehadiran (Online & Typing Status)
        const myPresenceRef = db.ref(`rooms/${roomId}/presence/p${myPlayerId}`);
        myPresenceRef.onDisconnect().set({ online: false, typing: false });
        myPresenceRef.set({ online: true, typing: false });

        // Update indikator UI sendiri
        document.getElementById(`status${myPlayerId}`).innerText = "(🟢 Online)";
        document.getElementById(`status${myPlayerId}`).style.color = "#4caf50";

        // Pantau status pacar
        db.ref(`rooms/${roomId}/presence/p${partnerId}`).on('value', snap => {
            const data = snap.val();
            const statusEl = document.getElementById(`status${partnerId}`);
            if (!statusEl) return;
            
            if (data && data.online) {
                if (data.typing) {
                    statusEl.innerText = "❤️ Sedang menggambar...";
                    statusEl.style.color = "#ff4d6d";
                    statusEl.style.fontWeight = "bold";
                } else {
                    statusEl.innerText = "🟢 Online";
                    statusEl.style.color = "#4caf50";
                    statusEl.style.fontWeight = "normal";
                }
            } else {
                statusEl.innerText = "⚪ Menunggu...";
                statusEl.style.color = "#888";
                statusEl.style.fontWeight = "normal";
            }
        });

        // 10. Sistem Tantangan
        const challenges = ["🍎 Gambar Apel!", "🐱 Gambar Kucing", "🏠 Rumah Idaman", "🍕 Makanan Kesukaan", "❤️ Gambar Hati", "👽 Alien Nyasar", "🚗 Mobil Impian"];
        window.randomChallenge = () => challengeRef.set(challenges[Math.floor(Math.random() * challenges.length)]);
        challengeRef.on('value', snap => { if (snap.val()) document.getElementById('challengeText').innerText = "Tantangan: " + snap.val(); });

        // 11. Salin Link Sempurna
        document.getElementById('shareBtn').addEventListener('click', () => {
            const linkBuatPacar = `${window.location.href.split('?')[0]}?room=${roomId}&p=2`;
            navigator.clipboard.writeText(linkBuatPacar).then(() => {
                alert("Link berhasil disalin!\nSilakan kirim ke WA pasangan, jika di-klik dia otomatis masuk ke room ini secara real-time.");
            }).catch(() => prompt("Salin manual teks ini:", linkBuatPacar));
        });

        // 12. Fitur Download
        window.downloadSingle = () => {
            const link = document.createElement('a');
            link.download = `kanvas-ku-${generateId().substring(0,4)}.png`;
            link.href = myCanvas.toDataURL('image/png');
            link.click();
        };

        window.downloadCombined = () => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas1.width;
            tempCanvas.height = canvas1.height + canvas2.height + 20; 
            const tCtx = tempCanvas.getContext('2d');
            
            tCtx.fillStyle = '#fff0f3'; // Background pink terang
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            tCtx.drawImage(canvas1, 0, 0);
            tCtx.drawImage(canvas2, 0, canvas1.height + 20);

            const link = document.createElement('a');
            link.download = `couple-gabungan-${generateId().substring(0,4)}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
