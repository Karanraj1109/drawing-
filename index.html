<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Art Challenge ❤️</title>
    <style>
        /* ========================================================
           1. MODERN UI / CSS STYLING
           ======================================================== */
        :root {
            --primary: #ff4d6d;
            --secondary: #ff8fa3;
            --bg: #fff0f3;
            --surface: #ffffff;
            --text: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header & Challenge Area */
        .header {
            text-align: center;
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.1);
            margin-bottom: 15px;
            position: relative;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary);
        }

        .challenge-box {
            background: var(--bg);
            border: 2px dashed var(--secondary);
            border-radius: 12px;
            padding: 10px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-challenge {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            transition: 0.2s;
        }

        .btn-challenge:active { transform: scale(0.95); }

        /* Canvas Wrapper - Dua Canvas */
        .canvas-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 90px; /* Space for toolbar */
        }

        .canvas-box {
            background: var(--surface);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 10px;
            position: relative;
        }

        .canvas-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 30vh; /* Ideal untuk 2 canvas di layar HP */
            background-color: #fcfcfc;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            touch-action: none; /* Cegah layar scroll saat nggambar */
            cursor: crosshair;
        }

        /* Toolbar / Alat Gambar di Bawah */
        .toolbar {
            position: fixed;
            bottom: 15px;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            z-index: 100;
            gap: 10px;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="color"] {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}

        input[type="range"] { width: 80px; }

        .btn-tool {
            background: #eee;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-tool.active { background: var(--primary); color: white; }
        .btn-action {
            background: var(--text);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-share { background: #4caf50; }

        /* Disable touch visual for the other person's canvas */
        .disabled-canvas { opacity: 0.8; pointer-events: none; }
    </style>
</head>
