<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Art Challenge ❤️</title>
    <style>
        /* ==========================================
           1. TAMPILAN UI (Estetik & Modern)
           ========================================== */
        :root {
            --primary: #ff4d6d;
            --secondary: #ff8fa3;
            --bg: #fff0f3;
            --surface: #ffffff;
            --text: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Mencegah layar ke-scroll saat nggambar */
            overflow: hidden; 
            touch-action: none; 
        }

        /* Bagian Atas (Tantangan & Tombol Share) */
        .header {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 { margin: 0 0 10px 0; font-size: 18px; color: var(--primary); }

        .challenge-box {
            background: var(--bg);
            border: 2px dashed var(--secondary);
            border-radius: 10px;
            padding: 8px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-sm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-share {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Container 2 Kanvas */
        .canvas-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .canvas-box {
            position: relative;
            background: white;
            border-radius: 15px;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            height: 32vh; /* Membagi layar jadi 2 kanvas */
        }

        .canvas-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            z-index: 5;
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #fdfdfd;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            cursor: crosshair;
            display: block;
        }

        /* Kanvas orang lain dibikin agak redup dan gabisa dipencet */
        .disabled-canvas { opacity: 0.8; pointer-events: none; }

        /* Toolbar Alat Gambar di Bawah */
        .toolbar {
            position: fixed;
            bottom: 10px;
            width: 95%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; }

        input[type="color"] { width: 35px; height: 35px; border: none; background: none; }
        input[type="range"] { width: 70px; }

        .btn-tool {
            background: #eee;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-tool.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <!-- Area Atas -->
    <div class="header">
        <h1>🎨 Couple Art Challenge</h1>
        <div class="challenge-box">
            <span id="challengeText">Tantangan: 🍎 Gambar Apel!</span>
            <button class="btn-sm" onclick="randomChallenge()">Ganti Ide</button>
        </div>
        <button class="btn-share" id="shareBtn">💌 Salin Link Buat Pacar</button>
    </div>

    <!-- Area Kanvas -->
    <div class="canvas-container">
        <div class="canvas-box" id="box1">
            <div class="canvas-label" id="label1">Kanvas P1</div>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="canvas-box" id="box2">
            <div class="canvas-label" id="label2" style="background:var(--secondary);">Kanvas P2</div>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <!-- Area Alat Gambar -->
    <div class="toolbar">
        <div class="tool-group">
            <input type="color" id="colorPicker" value="#ff4d6d">
            <input type="range" id="sizePicker" min="1" max="20" value="4">
        </div>
        <div class="tool-group">
            <button class="btn-tool active" id="btnDraw" onclick="setTool('draw')">✏️</button>
            <button class="btn-tool" id="btnErase" onclick="setTool('erase')">🧽</button>
            <button class="btn-tool" onclick="clearMyCanvas()">🗑️</button>
        </div>
    </div>

    <!-- ==========================================
         2. LOGIKA JAVASCRIPT & FIREBASE
         ========================================== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. Inisialisasi Database Gratis Firebase
        const firebaseConfig = {
            databaseURL: "https://kanvas-ldr-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Setup ID Room & Identifikasi Siapa yang Buka
        let urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        let playerNum = urlParams.get('p'); // p=1 (Kamu), p=2 (Pacar)
        
        // Kalau URL kosong, berarti kamu yang bikin room (Player 1)
        if (!roomId || !playerNum) {
            roomId = Math.random().toString(36).substring(2, 8);
            playerNum = '1';
            window.history.replaceState({}, '', `?room=${roomId}&p=1`);
        }

        const myPlayerId = parseInt(playerNum);
        const drawRef = db.ref(`rooms/${roomId}/drawings`);
        const challengeRef = db.ref(`rooms/${roomId}/challenge`);

        // 3. Setup Kanvas Masing-masing
        const canvas1 = document.getElementById('canvas1');
        const canvas2 = document.getElementById('canvas2');
        const ctx1 = canvas1.getContext('2d');
        const ctx2 = canvas2.getContext('2d');

        let myCanvas, myCtx;
        
        // Atur agar Player cuma bisa nyoret kanvasnya sendiri
        if (myPlayerId === 1) {
            myCanvas = canvas1; myCtx = ctx1;
            document.getElementById('box2').classList.add('disabled-canvas');
            document.getElementById('label1').innerText = "Kanvas Kamu";
            document.getElementById('label2').innerText = "Kanvas Pacar";
        } else {
            myCanvas = canvas2; myCtx = ctx2;
            document.getElementById('box1').classList.add('disabled-canvas');
            document.getElementById('label2').innerText = "Kanvas Kamu";
            document.getElementById('label1').innerText = "Kanvas Pacar";
            document.getElementById('shareBtn').style.display = 'none'; // Sembunyikan tombol share di HP pacar
        }

        // Fix resolusi kanvas biar kursor nggak lari
        function fixCanvasSize() {
            [canvas1, canvas2].forEach(c => {
                const rect = c.parentElement.getBoundingClientRect();
                c.width = rect.width - 10;
                c.height = rect.height - 10;
            });
        }
        window.addEventListener('load', fixCanvasSize);
        setTimeout(fixCanvasSize, 500); // Ekstra fix untuk HP

        // 4. Sistem Alat Gambar (Kuas & Penghapus)
        let currentTool = 'draw';
        function setTool(tool) {
            currentTool = tool;
            document.getElementById('btnDraw').classList.toggle('active', tool === 'draw');
            document.getElementById('btnErase').classList.toggle('active', tool === 'erase');
        }

        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');

        // 5. Logika Menggambar
        let painting = false;

        function getMousePos(e) {
            const rect = myCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function sendDraw(x, y, isDrawing) {
            const color = currentTool === 'erase' ? '#fdfdfd' : colorPicker.value; // Kalau penghapus, pakai warna background
            drawRef.child(`p${myPlayerId}`).push({ x, y, c: color, s: sizePicker.value, d: isDrawing });
        }

        function startPosition(e) {
            painting = true;
            const pos = getMousePos(e);
            sendDraw(pos.x, pos.y, false);
        }

        function finishedPosition() { painting = false; }

        function draw(e) {
            if (!painting) return;
            const pos = getMousePos(e);
            sendDraw(pos.x, pos.y, true);
        }

        // Listener untuk HP (Touch) & PC (Mouse)
        myCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        myCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        myCanvas.addEventListener('touchend', finishedPosition);
        
        myCanvas.addEventListener('mousedown', startPosition);
        myCanvas.addEventListener('mousemove', draw);
        myCanvas.addEventListener('mouseup', finishedPosition);
        myCanvas.addEventListener('mouseleave', finishedPosition);

        // 6. Menerima Gambar dari Firebase (Real-time untuk P1 & P2)
        function listenToCanvas(playerId, ctx, canvasEl) {
            let lastX = null, lastY = null;
            
            drawRef.child(`p${playerId}`).limitToLast(500).on('child_added', snap => {
                const data = snap.val();
                
                if (data.clear) {
                    ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
                    lastX = null; lastY = null; return;
                }

                ctx.lineWidth = data.s;
                ctx.lineCap = 'round';
                ctx.strokeStyle = data.c;

                if (data.d && lastX !== null && lastY !== null) {
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(data.x, data.y);
                    ctx.stroke();
                }
                lastX = data.x;
                lastY = data.y;
            });
        }
        listenToCanvas(1, ctx1, canvas1);
        listenToCanvas(2, ctx2, canvas2);

        // Hapus Kanvas Sendiri
        window.clearMyCanvas = () => {
            drawRef.child(`p${myPlayerId}`).push({ clear: true });
        }

        // 7. Sistem Tantangan (Challenge) Sinkron Berdua
        const challenges = ["🍎 Gambar Apel!", "🐱 Gambar Kucing Lucu", "🏠 Rumah Idaman Kita", "🍕 Makanan Kesukaanmu", "❤️ Gambar Hati Estetik", "👽 Alien Nyasar", "🚗 Mobil Impian"];
        
        window.randomChallenge = () => {
            const randomText = challenges[Math.floor(Math.random() * challenges.length)];
            challengeRef.set(randomText);
        }

        challengeRef.on('value', snap => {
            if (snap.val()) document.getElementById('challengeText').innerText = "Tantangan: " + snap.val();
        });

        // 8. Tombol Salin Link Khusus buat Pacar (Otomatis jadi P2)
        document.getElementById('shareBtn').addEventListener('click', () => {
            const baseURL = window.location.href.split('?')[0];
            const linkBuatPacar = `${baseURL}?room=${roomId}&p=2`;
            
            navigator.clipboard.writeText(linkBuatPacar).then(() => {
                alert("Link buat pacar berhasil disalin! Silakan paste & kirim di WhatsApp.\n\nNanti dia otomatis ngisi kanvas yang bawah.");
            }).catch(() => {
                alert("Gagal menyalin. Salin manual teks ini: " + linkBuatPacar);
            });
        });
    </script>
</body>
</html>
