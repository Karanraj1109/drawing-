<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Play ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ========================================================
           CSS: DESIGN SYSTEM & VARIABLES
           ======================================================== */
        :root {
            --primary: #ff4b82;
            --secondary: #9d4edd;
            --bg-gradient: linear-gradient(135deg, #1a0b2e, #3b185f);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #ffb3c6;
            --success: #00f5d4;
            --danger: #ff0054;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* UI Containers */
        #app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: none; /* Hidden by default */
            flex-direction: column;
            animation: fadeIn 0.4s ease-out forwards;
            overflow-y: auto;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography & Components */
        h1, h2, h3 { text-align: center; margin-bottom: 16px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .text-gradient {
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(255, 75, 130, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn:active { transform: scale(0.95); }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            box-shadow: none;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        /* Custom UI Elements */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        /* Lobby specific */
        .player-card {
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-gradient);
            margin: 0 auto 10px;
            border: 3px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .status { font-size: 12px; padding: 4px 12px; border-radius: 12px; display: inline-block;}
        .status.ready { background: var(--success); color: #000; font-weight: bold;}
        .status.wait { background: var(--danger); color: #fff; }

        /* Chat System */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            height: 250px;
        }
        .chat-messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .bubble { padding: 10px 14px; border-radius: 16px; max-width: 80%; font-size: 14px; }
        .bubble.me { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble.partner { background: var(--secondary); align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-input-wrapper { display: flex; gap: 8px; }
        .chat-input-wrapper input { margin-bottom: 0; text-align: left; }
        .chat-input-wrapper button { width: auto; padding: 0 20px; margin-bottom: 0; border-radius: 16px; }

        /* Toast / Error */
        #toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--danger); padding: 10px 20px; border-radius: 20px;
            font-size: 14px; z-index: 1000; display: none;
        }

        /* Game Containers */
        .game-canvas-wrapper { width: 100%; aspect-ratio: 1; background: #fff; border-radius: 16px; margin-bottom: 16px; overflow: hidden; position: relative;}
        .tap-area { width: 100%; height: 200px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 48px; user-select: none;}
        .tap-me { background: linear-gradient(45deg, #00f5d4, #00bbf9); box-shadow: 0 0 20px rgba(0, 245, 212, 0.5); }
        .tap-partner { background: rgba(255,255,255,0.1); }
        .score-board { font-size: 32px; font-weight: 800; text-align: center; margin: 20px 0;}

        /* Floating Hearts */
        .heart { position: absolute; font-size: 24px; animation: floatUp 3s ease-in forwards; pointer-events: none; opacity: 0;}
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* ========================================================
           NEW CSS: PROFILE & AWARDS
           ======================================================== */
        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }
        .stat-box span { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .stat-box strong { font-size: 18px; color: white; }
        
        .history-item {
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Awards Card */
        .award-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
            border: 1px solid var(--glass-border);
        }
        .award-card.unlocked {
            background: rgba(255, 75, 130, 0.15);
            border: 1px solid var(--primary);
            box-shadow: 0 0 15px rgba(255, 75, 130, 0.3);
        }
        .award-icon {
            font-size: 36px;
            margin-right: 16px;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: 0.3s;
        }
        .award-card.unlocked .award-icon {
            filter: none;
            opacity: 1;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
        }
        .award-info { flex-grow: 1; }
        .award-info h4 { margin: 0 0 4px 0; font-size: 16px; color: rgba(255,255,255,0.5); }
        .award-card.unlocked .award-info h4 { color: white; }
        .award-info p { margin: 0; font-size: 12px; color: var(--text-muted); }
        
        /* Progress Bar */
        .progress-bg {
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            width: 100%;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

<div id="toast">Error Message</div>

<div id="app-container">
    
    <!-- 1. SPLASH / LOADING SCREEN -->
    <div id="screen-splash" class="screen active" style="justify-content: center;">
        <h1 class="text-gradient" style="font-size: 48px;">Couple<br>Play ❤️</h1>
        <p style="text-align: center; color: var(--text-muted);">Authenticating...</p>
    </div>

    <!-- 2. HOME SCREEN -->
    <div id="screen-home" class="screen">
        <h2 class="text-gradient" style="margin-top: 20px; margin-bottom: 40px;">Couple Play ❤️</h2>
        
        <div class="glass" style="padding: 24px; margin-bottom: 24px;">
            <p style="text-align: center; margin-bottom: 16px;">Play with your partner in Real-time!</p>
            <button class="btn" onclick="app.createRoom()">❤️ Create Room</button>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="join-code" placeholder="Enter 6-Digit Code" maxlength="6" style="text-transform: uppercase;">
                <button class="btn" style="width: auto; padding: 0 20px;" onclick="app.joinRoom()">Join</button>
            </div>
        </div>

        <div class="grid-2">
            <!-- UPDATED: Added onclick to navigate to Profile and Awards -->
            <button class="btn btn-outline glass" onclick="app.showProfile()">👤 Profile</button>
            <button class="btn btn-outline glass" onclick="app.showAwards()">🏆 Awards</button>
        </div>
    </div>

    <!-- NEW: 2A. PROFILE SCREEN -->
    <div id="screen-profile" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 class="text-gradient" style="margin: 0;">My Profile</h3>
            <button class="btn btn-outline" style="width: auto; padding: 4px 12px; margin:0;" onclick="app.switchScreen('screen-home')">Back</button>
        </div>

        <div class="glass" style="padding: 24px; text-align: center; margin-bottom: 16px;">
            <div class="avatar" id="profile-avatar" style="width: 100px; height: 100px; font-size: 48px; margin: 0 auto 16px;">👤</div>
            <h2 id="profile-name" style="margin-bottom: 4px;">Player</h2>
            <p id="profile-uid" style="font-size: 11px; color: var(--text-muted); margin-bottom: 16px; word-break: break-all;">UID: -</p>
            
            <div style="display: flex; gap: 8px; justify-content: center;">
                <button class="btn btn-outline" style="padding: 8px 16px; font-size: 12px; width: auto;" onclick="app.editAvatar()">Ganti Avatar</button>
                <button class="btn btn-outline" style="padding: 8px 16px; font-size: 12px; width: auto;" onclick="app.editName()">Edit Nama</button>
            </div>
        </div>

        <h4 style="margin-bottom: 12px;">Statistics</h4>
        <div class="grid-3" style="margin-bottom: 10px;">
            <div class="stat-box"><span>Level</span><strong id="stat-level">1</strong></div>
            <div class="stat-box"><span>XP</span><strong id="stat-xp">0</strong></div>
            <div class="stat-box"><span>Match</span><strong id="stat-match">0</strong></div>
        </div>
        <div class="grid-3" style="margin-bottom: 20px;">
            <div class="stat-box"><span>Win</span><strong id="stat-win" style="color: var(--success)">0</strong></div>
            <div class="stat-box"><span>Lose</span><strong id="stat-lose" style="color: var(--danger)">0</strong></div>
            <div class="stat-box"><span>Win Rate</span><strong id="stat-wr">0%</strong></div>
        </div>

        <h4 style="margin-bottom: 12px;">Recent History</h4>
        <div id="profile-history" style="flex-grow: 1; overflow-y: auto;">
            <!-- History will be injected here -->
        </div>
    </div>

    <!-- NEW: 2B. AWARDS SCREEN -->
    <div id="screen-awards" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h3 class="text-gradient" style="margin: 0;">Achievements</h3>
            <button class="btn btn-outline" style="width: auto; padding: 4px 12px; margin:0;" onclick="app.switchScreen('screen-home')">Back</button>
        </div>

        <div id="awards-list" style="flex-grow: 1; overflow-y: auto; padding-bottom: 20px;">
            <!-- Awards will be injected here -->
        </div>
    </div>

    <!-- 3. LOBBY SCREEN -->
    <div id="screen-lobby" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <button class="btn btn-outline" style="width: auto; padding: 8px 16px; margin:0;" onclick="app.leaveRoom()">Leave</button>
            <h3 style="margin: 0;">Room: <span id="room-code-display" class="text-gradient"></span></h3>
        </div>

        <div class="grid-2">
            <div class="glass player-card">
                <div class="avatar" id="host-avatar">👑</div>
                <h4 id="host-name">Host</h4>
                <div class="status ready" id="host-status">Ready</div>
            </div>
            <div class="glass player-card">
                <div class="avatar" id="guest-avatar">⏳</div>
                <h4 id="guest-name">Waiting...</h4>
                <div class="status wait" id="guest-status">Not Ready</div>
            </div>
        </div>

        <!-- Chat UI -->
        <div class="chat-container">
            <div class="chat-messages" id="chat-box"></div>
            <div class="chat-input-wrapper">
                <input type="text" id="chat-input" placeholder="Say something sweet...">
                <button class="btn" onclick="app.sendMessage()">Send</button>
            </div>
        </div>

        <button class="btn" id="btn-ready" onclick="app.toggleReady()">I'm Ready!</button>
        <button class="btn" id="btn-start-game" style="display: none;" onclick="app.showGameSelector()">Start Game 🎮</button>
    </div>

    <!-- 4. GAME SELECTOR SCREEN -->
    <div id="screen-game-selector" class="screen">
        <h2 class="text-gradient">Mini Games</h2>
        <div style="overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px;">
            <button class="btn glass" onclick="app.initGame('draw')">🎨 Draw Together</button>
            <button class="btn glass" onclick="app.initGame('fasttap')">⚡ Fast Tap</button>
            <button class="btn glass" onclick="app.initGame('whoknows')">🤔 Who Knows Me Better</button>
            <button class="btn glass" onclick="app.initGame('truthdare')">🫣 Truth or Dare</button>
            <button class="btn glass" onclick="app.initGame('emoji')">😂 Tebak Emoji</button>
            <button class="btn glass btn-outline" onclick="app.backToLobby()">Back to Lobby</button>
        </div>
    </div>

    <!-- 5. ACTIVE GAME SCREEN (Dynamic Container) -->
    <div id="screen-active-game" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="game-title" class="text-gradient">Game</h3>
            <button class="btn btn-outline" style="width:auto; padding: 4px 12px; margin:0;" onclick="app.endGame()">End Game</button>
        </div>
        
        <!-- Game Area Injected Here via JS -->
        <div id="game-area" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin-top: 20px;">
            <!-- Content changes based on selected game -->
        </div>
    </div>

</div>

<!-- ========================================================
     JAVASCRIPT: FIREBASE & APP LOGIC
     ======================================================== -->
<script type="module">
    // 1. FIREBASE SDK IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, serverTimestamp, arrayUnion, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 2. FIREBASE CONFIGURATION (TEMPEL CONFIG ANDA DI SINI)
    const firebaseConfig = {
      apiKey: "AIzaSyDXF6bdnnDdRdq3D3BqPW17ZTORaJQ2JFk",
      authDomain: "couple-play-d5636.firebaseapp.com",
      projectId: "couple-play-d5636",
      storageBucket: "couple-play-d5636.firebasestorage.app",
      messagingSenderId: "220959170432",
      appId: "1:220959170432:web:e9e4537b4e294cb524eb65",
      measurementId: "G-JVENKWY99S"
    };  

    // Prevent error if config is empty during first run layout check
    let appFirebase, auth, db;
    try {
        appFirebase = initializeApp(firebaseConfig);
        auth = getAuth(appFirebase);
        db = getFirestore(appFirebase);
    } catch(e) {
        console.error("Firebase config is missing or invalid. Please add your config.", e);
    }

    // 3. MAIN APPLICATION CLASS
    class CouplePlayApp {
        constructor() {
            this.user = null;
            this.roomId = null;
            this.isHost = false;
            this.roomUnsubscribe = null;
            this.chatUnsubscribe = null;
            this.gameState = {};
            
            // Audio
            this.sfxClick = new Audio(''); 
            
            this.initAuth();
        }

        // --- UTILS & UI ---
        showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        playClick() { if(this.sfxClick.src) this.sfxClick.play().catch(e=>{}); }

        // --- AUTHENTICATION & PROFILE CREATION ---
        async initAuth() {
            if(!auth) {
                this.showToast("Setup Firebase Config dulu ya!");
                return;
            }
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    this.user = user;
                    await this.initUserProfile(); // NEW: Ensure profile exists
                    setTimeout(() => this.switchScreen('screen-home'), 1500);
                } else {
                    signInAnonymously(auth).catch(err => this.showToast("Gagal Login: " + err.message));
                }
            });
        }

        // NEW: Initialize User Profile in Firestore
        async initUserProfile() {
            const userRef = doc(db, "users", this.user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    name: "Player " + Math.floor(Math.random() * 1000),
                    avatar: "👤",
                    level: 1,
                    xp: 0,
                    matches: 0,
                    wins: 0,
                    loses: 0,
                    draws: 0,
                    history: [], // [{game: 'Fast Tap', result: 'Win', date: '...'}]
                    createdAt: serverTimestamp()
                });
            }
        }

        // NEW: Load & Show Profile Screen
        async showProfile() {
            this.playClick();
            this.switchScreen('screen-profile');
            
            const snap = await getDoc(doc(db, "users", this.user.uid));
            if(snap.exists()) {
                const data = snap.data();
                
                document.getElementById('profile-avatar').innerText = data.avatar || "👤";
                document.getElementById('profile-name').innerText = data.name || "Player";
                document.getElementById('profile-uid').innerText = "UID: " + this.user.uid;
                
                document.getElementById('stat-level').innerText = data.level || 1;
                document.getElementById('stat-xp').innerText = data.xp || 0;
                
                const matches = data.matches || 0;
                const wins = data.wins || 0;
                const loses = data.loses || 0;
                
                document.getElementById('stat-match').innerText = matches;
                document.getElementById('stat-win').innerText = wins;
                document.getElementById('stat-lose').innerText = loses;
                
                let wr = matches > 0 ? Math.round((wins / matches) * 100) : 0;
                document.getElementById('stat-wr').innerText = wr + "%";

                // Render History
                const historyContainer = document.getElementById('profile-history');
                historyContainer.innerHTML = '';
                if(data.history && data.history.length > 0) {
                    data.history.reverse().forEach(h => {
                        let color = h.result === 'Win' ? 'var(--success)' : (h.result === 'Lose' ? 'var(--danger)' : 'white');
                        historyContainer.innerHTML += `
                            <div class="history-item">
                                <div>
                                    <strong style="display:block; font-size:14px;">${h.game}</strong>
                                    <span style="font-size:11px; color:var(--text-muted);">${h.date}</span>
                                </div>
                                <span style="font-weight:bold; color:${color};">${h.result}</span>
                            </div>
                        `;
                    });
                } else {
                    historyContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:12px; margin-top:20px;">Belum ada pertandingan.</p>`;
                }
            }
        }

        // NEW: Update Name
        async editName() {
            const newName = prompt("Masukkan nama baru:");
            if(newName && newName.trim() !== "") {
                await updateDoc(doc(db, "users", this.user.uid), { name: newName.trim() });
                this.showProfile();
            }
        }

        // NEW: Update Avatar
        async editAvatar() {
            const newAvatar = prompt("Masukkan emoji untuk Avatar kamu:\n(Contoh: 🦊, 🐯, 🐼, 👽)");
            if(newAvatar && newAvatar.trim() !== "") {
                await updateDoc(doc(db, "users", this.user.uid), { avatar: newAvatar.trim() });
                this.showProfile();
            }
        }

        // NEW: Load & Show Awards Screen
        async showAwards() {
            this.playClick();
            this.switchScreen('screen-awards');
            
            const snap = await getDoc(doc(db, "users", this.user.uid));
            let data = snap.exists() ? snap.data() : { matches: 0, wins: 0, history: [] };
            
            // Define Achievements based on user stat target
            const achievementsList = [
                { id: 'first_match', icon: '❤️', title: 'First Match', desc: 'Mainkan pertandingan pertamamu', target: 1, current: data.matches || 0 },
                { id: 'first_win', icon: '🏆', title: 'First Win', desc: 'Menangkan 1 pertandingan', target: 1, current: data.wins || 0 },
                { id: 'win_10', icon: '🔥', title: 'Win 10 Games', desc: 'Menangkan 10 pertandingan', target: 10, current: data.wins || 0 },
                { id: 'win_50', icon: '⭐', title: 'Win 50 Games', desc: 'Menangkan 50 pertandingan', target: 50, current: data.wins || 0 },
                { id: 'artist', icon: '🎨', title: 'Artist', desc: 'Main Draw Together 5 kali', target: 5, current: (data.history || []).filter(h => h.game === 'Draw Together').length },
                { id: 'funny_couple', icon: '😂', title: 'Funny Couple', desc: 'Main Tebak Emoji 5 kali', target: 5, current: (data.history || []).filter(h => h.game === 'Tebak Emoji').length },
                { id: 'soulmate', icon: '💌', title: 'Soulmate', desc: 'Main Who Knows Me Better 5 kali', target: 5, current: (data.history || []).filter(h => h.game === 'Who Knows Me Better').length },
                { id: 'legend', icon: '👑', title: 'Couple Legend', desc: 'Main total 100 pertandingan', target: 100, current: data.matches || 0 }
            ];

            const listContainer = document.getElementById('awards-list');
            listContainer.innerHTML = '';

            achievementsList.forEach(ach => {
                let isUnlocked = ach.current >= ach.target;
                let progressPercent = Math.min((ach.current / ach.target) * 100, 100);
                
                listContainer.innerHTML += `
                    <div class="award-card ${isUnlocked ? 'unlocked' : ''}">
                        <div class="award-icon">${ach.icon}</div>
                        <div class="award-info">
                            <h4>${ach.title}</h4>
                            <p>${ach.desc}</p>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                            </div>
                            <span style="font-size: 10px; color: var(--text-muted); display: block; margin-top: 4px; text-align: right;">${ach.current} / ${ach.target}</span>
                        </div>
                    </div>
                `;
            });
        }


        // --- ROOM MANAGEMENT ---
        generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        async createRoom() {
            this.playClick();
            const code = this.generateRoomCode();
            try {
                // Get user info to populate lobby
                const userSnap = await getDoc(doc(db, "users", this.user.uid));
                const uData = userSnap.exists() ? userSnap.data() : { avatar: '👑', name: 'Host' };

                await setDoc(doc(db, "rooms", code), {
                    host: this.user.uid,
                    hostAvatar: uData.avatar,
                    hostName: uData.name,
                    guest: null,
                    guestAvatar: null,
                    guestName: null,
                    hostReady: false,
                    guestReady: false,
                    status: 'lobby',
                    gameType: null,
                    gameState: {},
                    createdAt: serverTimestamp()
                });
                this.isHost = true;
                this.roomId = code;
                this.enterLobby();
            } catch(e) { this.showToast("Gagal membuat room!"); console.error(e); }
        }

        async joinRoom() {
            this.playClick();
            const codeInput = document.getElementById('join-code').value.toUpperCase();
            if(codeInput.length !== 6) return this.showToast("Kode tidak valid");
            
            const roomRef = doc(db, "rooms", codeInput);
            const snap = await getDoc(roomRef);
            
            if(!snap.exists()) return this.showToast("Room tidak ditemukan!");
            const data = snap.data();
            
            if(data.guest && data.guest !== this.user.uid) {
                return this.showToast("Room penuh (Maksimal 2 orang)!");
            }

            // Get user info to populate lobby
            const userSnap = await getDoc(doc(db, "users", this.user.uid));
            const uData = userSnap.exists() ? userSnap.data() : { avatar: '💖', name: 'Partner' };

            await updateDoc(roomRef, { 
                guest: this.user.uid,
                guestAvatar: uData.avatar,
                guestName: uData.name
            });
            this.isHost = false;
            this.roomId = codeInput;
            this.enterLobby();
        }

        enterLobby() {
            document.getElementById('room-code-display').innerText = this.roomId;
            this.switchScreen('screen-lobby');
            this.listenToRoom();
            this.listenToChat();
        }

        listenToRoom() {
            if(this.roomUnsubscribe) this.roomUnsubscribe();
            
            this.roomUnsubscribe = onSnapshot(doc(db, "rooms", this.roomId), (docSnap) => {
                if(!docSnap.exists()) {
                    this.leaveRoom(false);
                    this.showToast("Room telah ditutup Host.");
                    return;
                }
                
                const data = docSnap.data();
                this.gameState = data.gameState; 

                // Update UI Lobby with actual Name and Avatar
                document.getElementById('host-avatar').innerText = data.hostAvatar || "👑";
                document.getElementById('host-name').innerText = data.hostName || "Host";

                document.getElementById('guest-avatar').innerText = data.guest ? (data.guestAvatar || "💖") : "⏳";
                document.getElementById('guest-name').innerText = data.guest ? (data.guestName || "Partner") : "Waiting...";
                
                const hostStatus = document.getElementById('host-status');
                hostStatus.innerText = data.hostReady ? "Ready" : "Not Ready";
                hostStatus.className = "status " + (data.hostReady ? "ready" : "wait");
                
                const guestStatus = document.getElementById('guest-status');
                guestStatus.innerText = data.guestReady ? "Ready" : "Not Ready";
                guestStatus.className = "status " + (data.guestReady ? "ready" : "wait");

                const btnReady = document.getElementById('btn-ready');
                const btnStart = document.getElementById('btn-start-game');
                
                let isMeReady = this.isHost ? data.hostReady : data.guestReady;
                btnReady.innerText = isMeReady ? "Batalkan Ready" : "I'm Ready!";
                btnReady.className = isMeReady ? "btn btn-outline" : "btn";

                if (this.isHost) {
                    if (data.hostReady && data.guestReady) {
                        btnStart.style.display = "block";
                        btnReady.style.display = "none";
                    } else {
                        btnStart.style.display = "none";
                        btnReady.style.display = "block";
                    }
                } else {
                    btnStart.style.display = "none";
                }

                if(data.status === 'playing' && data.gameType) {
                    if(document.getElementById('screen-active-game').className !== "screen active") {
                        this.renderGameUI(data.gameType);
                    }
                    this.updateGameStateUI(data.gameType, data.gameState);
                } else if(data.status === 'lobby') {
                    if(document.getElementById('screen-lobby').className !== "screen active") {
                        this.switchScreen('screen-lobby');
                    }
                }
            });
        }

        async toggleReady() {
            this.playClick();
            const roomRef = doc(db, "rooms", this.roomId);
            const snap = await getDoc(roomRef);
            const data = snap.data();
            
            if(this.isHost) {
                await updateDoc(roomRef, { hostReady: !data.hostReady });
            } else {
                await updateDoc(roomRef, { guestReady: !data.guestReady });
            }
        }

        async leaveRoom(deleteForHost = true) {
            if(this.roomUnsubscribe) this.roomUnsubscribe();
            if(this.chatUnsubscribe) this.chatUnsubscribe();
            this.roomId = null;
            this.isHost = false;
            this.switchScreen('screen-home');
        }

        // --- CHAT SYSTEM ---
        async sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !this.roomId) return;
            input.value = '';

            const chatRef = collection(db, `rooms/${this.roomId}/chat`);
            await addDoc(chatRef, {
                uid: this.user.uid,
                text: text,
                createdAt: serverTimestamp()
            });
        }

        listenToChat() {
            if(this.chatUnsubscribe) this.chatUnsubscribe();
            
            const q = query(collection(db, `rooms/${this.roomId}/chat`), orderBy("createdAt", "asc"));
            this.chatUnsubscribe = onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.uid === this.user.uid;
                    const div = document.createElement('div');
                    div.className = `bubble ${isMe ? 'me' : 'partner'}`;
                    div.innerText = msg.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
            
            document.getElementById('chat-input').onkeypress = (e) => {
                if(e.key === 'Enter') this.sendMessage();
            };
        }

        // --- GAME ENGINE ROUTING ---
        showGameSelector() {
            this.switchScreen('screen-game-selector');
        }

        async initGame(type) {
            this.playClick();
            const initialState = this.getInitialGameState(type);
            await updateDoc(doc(db, "rooms", this.roomId), {
                status: 'playing',
                gameType: type,
                gameState: initialState
            });
        }

        async endGame() {
            this.playClick();
            await updateDoc(doc(db, "rooms", this.roomId), {
                status: 'lobby',
                gameType: null,
                gameState: {},
                hostReady: false,
                guestReady: false
            });
        }

        getInitialGameState(type) {
            switch(type) {
                case 'fasttap': return { hostScore: 0, guestScore: 0, timeLeft: 10, playing: true };
                case 'draw': return { hostDraw: [], guestDraw: [], phase: 'drawing', timeLeft: 30 };
                case 'whoknows': return { question: "Apa makanan favoritku?", hostAnswer: "", guestAnswer: "", revealed: false };
                default: return {};
            }
        }

        renderGameUI(type) {
            const area = document.getElementById('game-area');
            const title = document.getElementById('game-title');
            this.switchScreen('screen-active-game');
            area.innerHTML = '';

            if (type === 'fasttap') {
                title.innerText = "⚡ Fast Tap";
                area.innerHTML = `
                    <div class="score-board">
                        <span style="color:var(--primary)">Me: <span id="ft-my-score">0</span></span> - 
                        <span style="color:var(--secondary)">Partner: <span id="ft-partner-score">0</span></span>
                    </div>
                    <h2 id="ft-timer" style="font-size:40px; text-align:center;">10s</h2>
                    <div class="glass tap-area tap-me" id="btn-tap">TAP!</div>
                `;
                if(this.isHost) {
                    this.tapInterval = setInterval(async () => {
                        if(this.gameState.timeLeft > 0) {
                            await updateDoc(doc(db, "rooms", this.roomId), {
                                "gameState.timeLeft": this.gameState.timeLeft - 1
                            });
                        } else {
                            clearInterval(this.tapInterval);
                            await updateDoc(doc(db, "rooms", this.roomId), { "gameState.playing": false });
                        }
                    }, 1000);
                }

                document.getElementById('btn-tap').onclick = () => {
                    if(!this.gameState.playing) return;
                    this.spawnHeart();
                    const scoreKey = this.isHost ? "gameState.hostScore" : "gameState.guestScore";
                    const currentScore = this.isHost ? this.gameState.hostScore : this.gameState.guestScore;
                    updateDoc(doc(db, "rooms", this.roomId), {
                        [scoreKey]: currentScore + 1
                    });
                };
            }
            else if (type === 'whoknows') {
                title.innerText = "🤔 Who Knows Me Better";
                area.innerHTML = `
                    <div class="glass" style="padding:20px; text-align:center; margin-bottom: 20px;">
                        <h3 id="wk-question" class="text-gradient">...</h3>
                    </div>
                    <div id="wk-input-area">
                        <input type="text" id="wk-answer" placeholder="Tulis jawabanmu...">
                        <button class="btn" id="btn-wk-submit">Submit Jawaban</button>
                    </div>
                    <div id="wk-result-area" style="display:none; text-align:center;">
                        <div class="grid-2">
                            <div class="glass player-card">
                                <h4>Host</h4>
                                <h3 id="wk-host-ans" style="color:var(--success)">?</h3>
                            </div>
                            <div class="glass player-card">
                                <h4>Partner</h4>
                                <h3 id="wk-guest-ans" style="color:var(--success)">?</h3>
                            </div>
                        </div>
                        ${this.isHost ? `<button class="btn btn-outline" id="btn-wk-next" style="margin-top:20px;">Next Question</button>` : `<p>Menunggu Host...</p>`}
                    </div>
                `;

                document.getElementById('btn-wk-submit').onclick = async () => {
                    const ans = document.getElementById('wk-answer').value;
                    if(!ans) return;
                    const key = this.isHost ? "gameState.hostAnswer" : "gameState.guestAnswer";
                    await updateDoc(doc(db, "rooms", this.roomId), { [key]: ans });
                    document.getElementById('wk-input-area').innerHTML = "<h3 style='text-align:center;'>Menunggu partner...</h3>";
                };

                if(this.isHost) {
                    const nextBtn = document.getElementById('btn-wk-next');
                    if(nextBtn) {
                        nextBtn.onclick = async () => {
                            const qs = ["Apa ukuran sepatuku?", "Apa kebiasaan burukku?", "Tempat kencan favoritku?"];
                            await updateDoc(doc(db, "rooms", this.roomId), {
                                gameState: { question: qs[Math.floor(Math.random()*qs.length)], hostAnswer: "", guestAnswer: "", revealed: false }
                            });
                        };
                    }
                }
            }
            else {
                title.innerText = "Game " + type;
                area.innerHTML = `
                    <div class="glass" style="padding: 30px; text-align: center;">
                        <h3>Game UI akan di-render di sini</h3>
                        <p>Real-time engine sudah terkoneksi.</p>
                    </div>
                `;
            }
        }

        updateGameStateUI(type, state) {
            if (type === 'fasttap') {
                const myScore = this.isHost ? state.hostScore : state.guestScore;
                const partnerScore = this.isHost ? state.guestScore : state.hostScore;
                
                const elMyScore = document.getElementById('ft-my-score');
                const elPartScore = document.getElementById('ft-partner-score');
                const elTimer = document.getElementById('ft-timer');
                const btnTap = document.getElementById('btn-tap');

                if(elMyScore) elMyScore.innerText = myScore;
                if(elPartScore) elPartScore.innerText = partnerScore;
                if(elTimer) elTimer.innerText = state.timeLeft + "s";

                if(!state.playing && btnTap) {
                    btnTap.innerHTML = "TIME'S UP!";
                    btnTap.className = "glass tap-area tap-partner";
                    let winner = "Tie!";
                    if(myScore > partnerScore) winner = "You Win! 🎉";
                    if(myScore < partnerScore) winner = "Partner Wins! 😜";
                    elTimer.innerText = winner;
                    if(this.isHost) clearInterval(this.tapInterval);
                }
            }
            else if (type === 'whoknows') {
                const qEl = document.getElementById('wk-question');
                if(qEl) qEl.innerText = state.question;

                if(state.hostAnswer && state.guestAnswer && !state.revealed) {
                    if(this.isHost) {
                        updateDoc(doc(db, "rooms", this.roomId), { "gameState.revealed": true });
                    }
                }

                if(state.revealed) {
                    const inputArea = document.getElementById('wk-input-area');
                    const resultArea = document.getElementById('wk-result-area');
                    if(inputArea) inputArea.style.display = 'none';
                    if(resultArea) {
                        resultArea.style.display = 'block';
                        document.getElementById('wk-host-ans').innerText = state.hostAnswer;
                        document.getElementById('wk-guest-ans').innerText = state.guestAnswer;
                    }
                }
            }
        }

        spawnHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 80 + 10 + '%';
            heart.style.bottom = '200px';
            document.getElementById('game-area').appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    }

    // Init App Globally
    window.app = new CouplePlayApp();
</script>
</body>
